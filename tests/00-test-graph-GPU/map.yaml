mapping:
  node-type: Tile 
  type: temporal 
  factors: M=64 L=32 
  permutation: ML 
  target: MainMemory 
  
  subtree: 
  - node-type: Scope 
    type: Pipeline 
    
    subtree: 
      - node-type: Tile 
        type: temporal 
        factors: M=2 L=4 
        split: 1
        permutation: ML 
        target: MainMemory
        
        subtree: 
        - node-type: Tile 
          type: spatial  
          factors: M=4 L=4 K=64
          permutation: MLK 
          target: RegFile
          
          subtree:
          - node-type: Op
            name: GEMM1 
            binding: M:M L:L K:K 


