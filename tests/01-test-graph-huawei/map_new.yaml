mapping:
  node-type: Tile 
  dataflow-mode: Forward
  type: temporal 
  factors: M=8
  permutation: M 
  target: MainMemory 

  subtree:
  - node-type: Tile
    dataflow-mode: Forward
    type: spatial 
    factors: L=8
    permutation: L 
    target: L1 

    subtree:
    - node-type: Scope
      type: Pipeline 

      subtree:
      - node-type: Tile
        dataflow-mode: Forward
        type: temporal 
        factors: M=4, L=4, K=4 # A[4*M, 4*K], B[4*K,4*L]
        permutation: MLK 
        target: L0AB

        subtree: 
        - node-type: Op
          name: GEMM1
          dataflow-mode: Forward
          factors: M=16 L=16 K=16 # A[M,K], B[K,L] --> C[M,L]
          permutation: MLK 
          target: Cube
          # binding: M:M, L:L, K:K

        - node-type: Trans
          dataflow-mode: Forward
          target: L0C

      - node-type: Tile
        dataflow-mode: Forward
        type: temporal
        factors: M=4 L=4
        permutation: ML
        target: L0C

        subtree: 
        - node-type: Op
          name: EXP
          dataflow-mode: Write-back
          factors: M=16 L=16
          permutation: ML
          target: Vector
          # binding: M:M, L:L

      - node-type: Trans
        dataflow-mode: Forward
        target: MainMemory


