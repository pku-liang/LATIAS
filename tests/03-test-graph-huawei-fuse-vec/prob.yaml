problem:
  io:
    ins: A, B
    outs: exp
  dimensions: [M, N]
  instance:
    M: 128
    N: 128

  ops:
  - name: SUB
    dimensions: [M,N]
    type: VECTOR
    data-spaces:
    - name: C
      projection:
        - [[M]]
        - [[N]]
      read-write: True
    - name: A
      projection:
        - [[M]]
        - [[N]]
    - name: B
      projection:
        - [[M]]
        - [[N]]
    ins: A, B
    out: C

  # - name: RELU
  #   dimensions: [M,N]
  #   type: VECTOR
  #   data-spaces:
  #   - name: C
  #     projection:
  #       - [[M]]
  #       - [[N]]
  #   - name: relu
  #     projection:
  #       - [[M]]
  #       - [[N]]
  #     read-write: True
  #   ins: C
  #   out: relu
  #   inplace: True

  - name: Exp
    dimensions: [M,N]
    type: VECTOR
    data-spaces:
    - name: C
      projection:
        - [[M]]
        - [[N]]
    - name: exp
      projection:
        - [[M]]
        - [[N]]
      read-write: True
    ins: relu
    out: exp
    inplace: True