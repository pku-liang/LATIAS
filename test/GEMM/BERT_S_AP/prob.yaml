problem:
  io:
    ins: A, B
    outs: exp
  dimensions: [M, N, K]
  instance:
    M: 512
    N: 512
    K: 512
    # L: 512

  ops:
  - name: GEMM1
    dimensions: [M,N,K]
    type: MATRIX
    data-spaces:
    - name: C
      projection:
        - [[M]]
        - [[N]]
      read-write: True 
    - name: A 
      projection:
        - [[M]]
        - [[K]]
    - name: B
      projection:
        - [[K]]
        - [[N]]
    ins: A, B
    out: C