mapping:
  node-type: Tile
  dataflow-mode: Write-back
  type: spatial
  factors: M=32, N=32
  fixed: 0
  permutation: MN
  target: MainMemory

  subtree:
  - node-type: Tile
    dataflow-mode: Write-back
    type: temporal
    factors: M=128, N=1
    permutation: MN
    target: UB

    subtree:
    - node-type: Scope
      type: Pipeline

      subtree:
      - node-type: OP
        name: SUB
        dataflow-mode: Write-back
        factors: M=1, N=128
        permutation: MN
        target: Vector

      # - node-type: Op
