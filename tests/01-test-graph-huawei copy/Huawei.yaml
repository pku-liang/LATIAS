architecture: 
  version: 0.2 

  subtree:
  - name: System
    
    local: 
    - name: MainMemory
      class: DRAM 
      attributes:
        sizeKB: 1048576
        word-bits: 8
        read_bandwidth: 4
        write_bandwidth: 4
        successor: L1, UB
        alignments: 0
        layout: ND

    - name: L1[0..19] 
      class: SRAM 
      attributes:
        meshX: 20 
        meshY: 1
        depth: 64 
        block_size: 1024 
        word-bits: 8
        read_bandwidth: 2
        write_bandwidth: 2
        successor: L0AB
        alignments: 0
      
    - name: L0AB[0..19] 
      class: SRAM 
      attributes:
        meshX: 20 
        meshY: 1
        depth: 64 
        block_size: 1024
        word-bits: 8
        read_bandwidth: 2
        write_bandwidth: 2
        successor: Cube
        alignments: 0
        layout: ND
    
    - name: Cube[0..19] 
      class: intmac 
      attributes: 
        word-bits: 16 
        meshX: 20
        meshY: 1
        compute_cycles: 1
        successor: L0C
        layout: ND

    - name: L0C[0..19] 
      class: SRAM 
      attributes:
        meshX: 20
        meshY: 1
        depth: 64 
        block_size: 1024
        word-bits: 8
        read_bandwidth: 2
        write_bandwidth: 2
        successor: MainMemory, Vector
        alignments: 0
        layout: ND

    - name: Vector[0..19] 
      class: intmac 
      attributes: 
        word-bits: 16 
        meshX: 20
        meshY: 1
        compute_cycles: 2
        successor: MainMemory, L0C
        layout: ND
    
    - name: UB[0..19] 
      class: SRAM 
      attributes:
        meshX: 20
        meshY: 1
        depth: 64 
        block_size: 1024
        word-bits: 8
        read_bandwidth: 2
        write_bandwidth: 2
        successor: MainMemory, Vector
        alignments: 0
        layout: ND