architecture: 
  version: 0.2 

  subtree:
  - name: System
    
    local: 
    - name: MainMemory
      class: DRAM 
      attributes:
        sizeKB: 1048576
        word-bits: 8
        successor: RegFile
        alignments: 0
        loadWidth: 128
        layout: ND

    - name: RegFile[0..15] 
      class: regfile 
      attributes:
        meshX: 4 
        meshY: 4
        depth: 64 
        block_size: 1024
        word-bits: 8
        read_bandwidth: 2
        write_bandwidth: 2
        successor: mac, MainMemory
        alignments: 0
        loadWidth: 128
        layout: ND

    - name: mac[0..15] 
      class: intmac 
      attributes: 
        word-bits: 16 
        meshX: 4
        meshY: 4
        successor: RegFile
        loadWidth: 128
        layout: ND
    
    - name: mac2[0..15] 
      class: intmac 
      attributes: 
        word-bits: 16 
        meshX: 4
        meshY: 4
        successor: RegFile
        loadWidth: 128
        layout: ND