mapping:
  node-type: Tile 
  dataflow-mode: Forward
  type: spatial 
  factors: M=2, N=2
  fixed: 0
  permutation: MN
  target: MainMemory 

  subtree:
  - node-type: Tile
    dataflow-mode: Forward
    type: temporal
    factors: K=8,5, M=4,1
    permutation: MK
    target: L1 

    subtree:
    - node-type: Tile
      dataflow-mode: Forward
      type: temporal
      factors: M=8, N=8, K=8,4
      permutation: MNK 
      target: L0AB

      subtree: 
      - node-type: Op
        name: GEMM1
        dataflow-mode: Forward
        factors: M=16, N=16, K=16
        permutation: MNK 
        target: Cube

    - node-type: Trans
      dataflow-mode: Forward
      target: L0C

  - node-type: Tile
    dataflow-mode: Forward
    type: temporal
    factors: M=8,2, N=64
    permutation: MN
    target: L0C

    subtree: 
    - node-type: Scope
      type: Parallel
      
      subtree:
      - node-type: OP
        name: RELU
        dataflow-mode: Write-back
        factors: M=64, N=2
        permutation: MN
        target: Vector

      - node-type: Op
        name: EXP
        dataflow-mode: Write-back
        factors: M=64, N=2
        permutation: MN
        target: Vector

  - node-type: Trans
    dataflow-mode: Forward
    target: MainMemory


