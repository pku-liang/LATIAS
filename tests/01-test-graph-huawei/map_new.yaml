mapping:
  node-type: Tile 
  dataflow-mode: Forward
  type: spatial 
  factors: M=8
  permutation: M 
  target: MainMemory 

  subtree:
  - node-type: Tile
    dataflow-mode: Forward
    type: temporal 
    factors: L=8
    permutation: L 
    target: L1 

    subtree:
    - node-type: Scope
      type: Pipeline 

      subtree:
      - node-type: Tile
        dataflow-mode: Forward
        type: temporal 
        factors: K=4,4
        permutation: K 
        target: L0AB

        subtree: 
        - node-type: Op
          name: GEMM1
          dataflow-mode: Forward
          factors: M=1 N=2 K=3
          permutation: MNK 
          target: Cube
          binding: M:M, N:N, K:K

      - node-type: Trans
        dataflow-mode: Forward
        target: L0C

      - node-type: Tile
        dataflow-mode: Write-back
        type: temporal
        factors: M=4 N=4
        permutation: MN
        target: L0C

        subtree: 
        - node-type: Op
          name: EXP
          dataflow-mode: Write-back
          factors: M=1 N=1
          permutation: MN
          target: Vector
          binding: M:M, N:N

      - node-type: Trans
        dataflow-mode: Forward
        target: MainMemory
