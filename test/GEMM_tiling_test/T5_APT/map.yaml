  dataflow-mode: Forward
  type: spatial 
  factors: M=8, N=4
  fixed: 0
  permutation: NM
  target: MainMemory 
  
  subtree:
  - node-type: Tile
    dataflow-mode: Forward
    type: temporal
    factors: K=16 # 
    permutation: K
    target: MainMemory

    subtree:
    - node-type: Tile
      dataflow-mode: Forward
      type: temporal
      factors: M=1, N=1, K=1 # 
      permutation: NKM
      target: L1 

      subtree:
      - node-type: Tile
        dataflow-mode: Forward
        type: temporal
        factors: M=8, N=16, K=4
        permutation: NKM 
        target: L0AB

        subtree: 
        - node-type: Op
          name: GEMM1
          dataflow-mode: Forward
          factors: M=16, N=16, K=16
          permutation: NKM 
          target: Cube

    - node-type: Trans
      dataflow-mode: Forward
      target: L0C

  - node-type: Trans
    dataflow-mode: Forward
    target: MainMemory