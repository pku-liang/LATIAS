problem:
  io:
    ins: A, B, D
    outs: E
  dimensions: [M, N, K]
  instance:
    M: 512
    N: 64
    K: 128
    L: 512

  ops:
  - name: GEMM1
    dimensions: [M,N,K]
    data-spaces:
    - name: C
      projection:
        - [[M]]
        - [[N]]
      read-write: True 
    - name: A 
      projection:
        - [[M]]
        - [[K]]
    - name: B
      projection:
        - [[K]]
        - [[N]]
    ins: A, B
    out: C
   
  - name: RELU 
    dimensions: [M,N]
    type: element-wise 
    data-spaces:
    - name: C
      projection:
        - [[M]]
        - [[N]]
    - name: relu 
      projection: 
        - [[M]]
        - [[N]]
      read-write: True 
    ins: C
    out: RELU
    inplace: True