mapping:
  node-type: Tile 
  dataflow-mode: Forward
  type: spatial 
  factors: M=4, N=2
  fixed: 0
  permutation: MN
  target: MainMemory 

  subtree:
  - node-type: Tile
    dataflow-mode: Forward
    type: temporal
    factors: K=8,5
    permutation: K
    target: L1 

    subtree:
    - node-type: Tile
      dataflow-mode: Forward
      type: temporal
      factors: M=8, N=8, K=8,4 # A[4*M, 4*K], B[4*K,4*L]
      permutation: MNK 
      target: L0AB

      subtree: 
      - node-type: Op
        name: GEMM1
        dataflow-mode: Forward
        factors: M=16, N=16, K=16 # A[M,K], B[K,L] --> C[M,L]
        permutation: MNK 
        target: Cube
          # binding: M:M, L:L, K:K

  - node-type: Trans # output dim: [M, N]
    dataflow-mode: Forward
    target: L0C

  - node-type: Tile
    dataflow-mode: Forward
    type: temporal
    factors: M=2, N=2
    permutation: MN
    target: L0C

    subtree: 
    - node-type: Scope
      type: Parallel
      
      subtree:
      - node-type: OP
        name: RELU
        dataflow-mode: Write-back
        factors: M=64, N=64
        permutation: MN
        target: Vector

      - node-type: Op
        name: EXP
        dataflow-mode: Write-back
        factors: M=64, N=64
        permutation: MN
        target: Vector

  - node-type: Trans
    dataflow-mode: Forward
    target: MainMemory


