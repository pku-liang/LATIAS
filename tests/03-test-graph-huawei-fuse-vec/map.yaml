mapping:
  node-type: Tile
  dataflow-mode: Write-back
  type: spatial
  factors: M=64, N=16
  fixed: 0
  permutation: MN
  target: MainMemory

  subtree:
  - node-type: Tile
    dataflow-mode: Write-back
    type: temporal
    factors: M=8, N=16
    permutation: MN
    target: UB
    
    subtree: 
    - node-type: Scope
      type: Pipeline

      subtree:
      - node-type: OP 
        name: SUB
        dataflow-mode: Write-back
        factors: M=8, N=16
        permutation: MN
        target: Vector

      - node-type: OP
        name: Exp
        dataflow-mode: Write-back
        factors: M=8, N=16
        permutation: NM
        target: Vector


